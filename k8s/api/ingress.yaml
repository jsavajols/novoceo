apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: novoceo
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - novoceo.api.local.happyapi.fr
      secretName: novoceo-api-tls
  rules:
    - host: novoceo.api.local.happyapi.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 5000
